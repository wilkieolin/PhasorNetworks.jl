# Environment for runnable demo scripts in scripts/.
# The package proper (PhasorNetworks) deliberately does NOT pull
# MLDatasets / MLUtils — that constraint chain was capping CUDA at v5.
# This sub-environment adds them just for scripts that need data loaders,
# without affecting downstream resolution of the package itself.
#
# Usage:
#   julia --project=scripts scripts/sfmnist.jl
#
# First-time setup:
#   julia --project=scripts -e 'using Pkg; Pkg.instantiate()'

[deps]
PhasorNetworks = "c32d742c-e486-48f1-8804-9f6fb4d3f42c"
MLDatasets = "eb30cadb-4394-5ae3-aed4-317e484a6458"
MLUtils = "f1d291b0-491e-4a28-83b9-f70985020b54"

# Listed explicitly so scripts can `using ...` them. They are also in
# PhasorNetworks's transitive deps, but Julia 1.12 doesn't promote
# transitive deps to the script's `using` namespace.
CUDA = "052768ef-5323-5732-b1bb-66c8b64840ba"
Lux = "b2108857-7c20-44ae-9111-449ecde12c47"
LuxCUDA = "d0bbae9a-e099-4d5b-a835-1c6931763bda"
OneHotArrays = "0b1bfda6-eb8a-41d2-88d8-f5af5cad476f"
Optimisers = "3bd65402-5787-11e9-1adc-39752487f4e2"
Zygote = "e88e6eb3-aa80-5325-afca-941959d7151f"

[sources]
PhasorNetworks = {path = ".."}
